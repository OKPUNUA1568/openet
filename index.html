<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basecamp Santai Abangkuh</title>
    <!-- Import Font Lucu -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffb347;
            --bg-color: #fdf6e3;
            --text-color: #5d4037;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            border: 5px solid var(--primary-color);
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #eee;
            margin-bottom: 1rem;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .avatar:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .status-badge {
            display: inline-block;
            background: #e1f5fe;
            color: #0288d1;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        p {
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            text-decoration: none;
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 0 #e69500;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #e69500;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 #e69500;
        }

        .joke-section {
            margin-top: 2rem;
            font-size: 0.9rem;
            font-style: italic;
            color: #999;
        }

        #magic-btn {
            margin-top: 15px;
            cursor: pointer;
            border: none;
            background: #ff6b6b;
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            font-family: 'Quicksand', sans-serif;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Gambar Masbro (Capybara) -->
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpldXp2Z3NreXN1eW13bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/A6aHBCFqlE0Rq/giphy.gif" alt="Capybara" class="avatar">
        
        <div class="status-badge">🟢 Sedang Prokrastinasi</div>
        
        <h1>Halo, Abangkuh! 🔥</h1>
        
        <p>Selamat datang di kediaman digital saya yang sangat <i>low maintenance</i> ini. Di sini tidak ada kodingan berat, cuma ada vibe santai.</p>
        
        <div class="social-links">
            <a href="https://github.com/USERNAME-ABANG" class="btn">Mampir ke Repo</a>
        </div>

        <button id="magic-btn" onclick="tambahMood()">Klik Buat Tambah Mood</button>

        <div class="joke-section">
            <p id="quote">"Capek ngoding? Tidur aja, Masbro. Dunia nggak akan kiamat kok."</p>
        </div>
    </div>

    <script>
        const quotes = [
            "Brain cells remaining: 2/10. Mohon jangan diajak mikir dulu.",
            "Status: Mencoba terlihat sibuk di depan atasan.",
            "Lagi nunggu hidayah buat benerin bug yang ada sejak 2024.",
            "Kodingan saya jalan, saya pun nggak tau kenapa.",
            "Motto hidup: Kalau bisa besok, kenapa harus sekarang?",
            "Gacor banget hari ini, baru bangun jam 11 siang."
        ];

        function tambahMood() {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quote').innerText = '"' + randomQuote + '"';
            
            // Efek warna random di background container
            const colors = ['#fff9db', '#e3f2fd', '#f3e5f5', '#e8f5e9'];
            document.querySelector('.container').style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        }
    </script>
</body>
</html>
